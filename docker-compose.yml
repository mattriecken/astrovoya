services:
  api:
    build: ./backend
    ports:
      - "8000:8000"
    volumes:
      - ./backend:/app
    env_file:
      - .env
    depends_on:
      - db

  db:
    image: postgres:15
    environment:
      POSTGRES_USER: astrovoya
      POSTGRES_PASSWORD: astrovoya
      POSTGRES_DB: astrovoya
    volumes:
      - postgres_data:/var/lib/postgresql/data

volumes:
  postgres_data: